name: wenci

services:
  mysql:
    image: mysql:8.0
    container_name: wenci-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: wenci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - wenci-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wenci-mysql-data:
    name: wenci-mysql-data
