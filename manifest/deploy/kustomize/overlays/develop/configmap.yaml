apiVersion: v1
kind: ConfigMap
metadata:
  name: template-single-configmap
data:
  config.yaml: |
    server:
      address:     ":8000"
      openapiPath: "/api.json"
      swaggerPath: "/swagger"

    logger:
      level : "all"
      stdout: true

    database:
      default:
        link: "mysql:root:root123456@tcp(127.0.0.1:3306)/wenci?charset=utf8mb4&parseTime=true&loc=Local"
